<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zinciri Kırma — Alışkanlık Takibi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0c;--surface:#1a1916;--surface2:#232220;--border:#2e2c28;--text:#e8e4dc;--muted:#7a7568;--accent:#d4a853;--accent2:#c4824a;--success:#6aaa6a;--danger:#c45a5a;--joker:#7ec8e3;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}

header{padding:30px 44px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:24px;background:var(--bg);position:sticky;top:0;z-index:100;}
.logo h1{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,3.2vw,2.5rem);font-weight:900;letter-spacing:-0.02em;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.logo p{font-size:0.72rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:5px;}
.today-pill{text-align:right;flex-shrink:0;}
.today-pill .big{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:700;color:var(--accent);line-height:1;}
.today-pill .small{font-size:0.68rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}

nav{display:flex;gap:3px;padding:14px 44px;border-bottom:1px solid var(--border);background:var(--bg);}
nav button{background:none;border:1px solid transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .2s;}
nav button:hover{color:var(--text);border-color:var(--border);}
nav button.active{background:var(--surface2);color:var(--accent);border-color:var(--border);}

main{display:flex;min-height:calc(100vh - 130px);}
.sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--border);padding:24px 18px;display:flex;flex-direction:column;gap:24px;overflow-y:auto;max-height:calc(100vh - 130px);}
.content{flex:1;padding:26px 40px;overflow-y:auto;min-width:0;}
.tab-panel{display:none;}.tab-panel.active{display:block;}

.sec{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

.form-col{display:flex;flex-direction:column;gap:8px;}
input,textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:300;padding:10px 12px;border-radius:8px;outline:none;transition:border-color .2s;resize:none;}
input:focus,textarea:focus{border-color:var(--accent);}
input::placeholder,textarea::placeholder{color:var(--muted);}
.color-row{display:flex;gap:6px;flex-wrap:wrap;}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .2s,border-color .2s;}
.swatch:hover{transform:scale(1.3);}
.swatch.on{border-color:white;}
.btn{background:var(--accent);color:#0f0e0c;border:none;font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.76rem;letter-spacing:0.1em;text-transform:uppercase;padding:10px 16px;border-radius:8px;cursor:pointer;transition:all .2s;width:100%;}
.btn:hover{background:#e0b85e;transform:translateY(-1px);}
.btn.joker-btn{background:rgba(126,200,227,0.1);color:var(--joker);border:1px solid rgba(126,200,227,0.3);font-size:0.76rem;}
.btn.joker-btn:hover{background:rgba(126,200,227,0.2);transform:none;}
.btn.joker-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;}

.goal-list{display:flex;flex-direction:column;gap:8px;}
.goal-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.goal-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gc,var(--accent));border-radius:3px 0 0 3px;}
.goal-item:hover{border-color:var(--muted);background:var(--surface2);}
.goal-item.on{border-color:var(--gc,var(--accent));background:var(--surface2);}
.gi-row{display:flex;align-items:center;gap:8px;}
.gi-name{font-weight:500;font-size:0.85rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gi-streak{display:flex;align-items:center;gap:3px;font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--accent);white-space:nowrap;}
.gi-desc{font-size:0.7rem;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gi-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:1px 5px;border-radius:4px;font-size:0.8rem;transition:color .2s;opacity:0;}
.goal-item:hover .gi-del{opacity:1;}
.gi-del:hover{color:var(--danger);}
.prog-bar{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:7px;}
.prog-fill{height:100%;border-radius:2px;transition:width .5s;}
.gi-sub{font-size:0.6rem;color:var(--muted);margin-top:3px;}

.joker-box{background:rgba(126,200,227,0.05);border:1px solid rgba(126,200,227,0.2);border-radius:10px;padding:12px 14px;}
.joker-box .jt{font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;}
.joker-box .jv{font-size:0.8rem;color:var(--joker);}
.joker-box .jh{font-size:0.65rem;color:var(--muted);margin-top:3px;}

.quote-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;position:relative;overflow:hidden;}
.quote-card::before{content:'"';position:absolute;top:-14px;left:12px;font-family:'Playfair Display',serif;font-size:6rem;color:var(--border);line-height:1;pointer-events:none;}
.quote-txt{font-family:'Playfair Display',serif;font-style:italic;font-size:0.9rem;line-height:1.65;position:relative;z-index:1;}
.quote-author{font-size:0.68rem;color:var(--muted);margin-top:7px;}
.qbtn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 11px;font-size:0.67rem;cursor:pointer;transition:all .2s;margin-top:11px;display:inline-flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;}
.qbtn:hover{border-color:var(--accent);color:var(--accent);}

.year-nav{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.year-nav button{background:var(--surface);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:0.9rem;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.year-nav button:hover{border-color:var(--accent);color:var(--accent);}
.year-lbl{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--accent);min-width:65px;text-align:center;}
.yr-hint{font-size:0.68rem;color:var(--muted);margin-left:auto;}

.year-cal{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:28px;}
.month-block{}
.month-hdr{display:flex;align-items:baseline;gap:7px;margin-bottom:9px;}
.month-name{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;}
.month-stat{font-size:0.62rem;color:var(--muted);}
.wday-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.wday{text-align:center;font-size:0.58rem;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);padding:2px 0;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dc{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:0.68rem;cursor:pointer;transition:all .13s;position:relative;border:1px solid transparent;background:var(--surface);color:var(--muted);user-select:none;}
.dc:hover:not(.empty):not(.fut){border-color:var(--muted);color:var(--text);transform:scale(1.12);z-index:2;}
.dc.empty{background:none;cursor:default;}
.dc.fut{opacity:0.2;cursor:not-allowed;}
.dc.today{border-color:var(--accent);color:var(--accent);font-weight:500;}
.dc.done{font-weight:500;color:#0f0e0c;border-color:transparent;}
.dc.done::after{content:'✓';position:absolute;top:1px;right:2px;font-size:0.48rem;opacity:0.7;}
.dc.joker-day{background:rgba(126,200,227,0.15)!important;color:var(--joker)!important;border:1px solid rgba(126,200,227,0.35)!important;}
.dc.joker-day::after{content:'★';position:absolute;top:0;right:2px;font-size:0.48rem;opacity:0.8;color:var(--joker);}

@keyframes todayPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,168,83,0.4);}50%{box-shadow:0 0 0 4px rgba(212,168,83,0);}}
.dc.today{animation:todayPulse 2.5s ease-in-out infinite;}
@keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
.pop-anim{animation:pop .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .28s ease forwards;}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px 18px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;bottom:-18px;right:-18px;width:60px;height:60px;border-radius:50%;background:rgba(212,168,83,0.06);}
.slbl{font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;}
.sval{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;color:var(--accent);line-height:1;}
.ssub{font-size:0.65rem;color:var(--muted);margin-top:3px;}

.badges-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
.badge{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 12px;transition:all .2s;}
.badge.earned{border-color:var(--accent);background:rgba(212,168,83,0.07);}
.badge.locked{opacity:0.3;filter:grayscale(1);}
.badge-icon{font-size:1.3rem;}
.badge-name{font-size:0.75rem;font-weight:500;}
.badge-desc{font-size:0.62rem;color:var(--muted);}

.heatmap-wrap{overflow-x:auto;padding-bottom:6px;}
.heatmap-grid{display:flex;gap:3px;}
.hm-week{display:flex;flex-direction:column;gap:3px;}
.hmc{width:12px;height:12px;border-radius:2px;cursor:pointer;transition:transform .1s;}
.hmc:hover{transform:scale(1.6);z-index:2;}

.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px;opacity:0.3;}
.empty-state h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text);margin-bottom:6px;}
.no-goal{background:var(--surface);border:1px dashed var(--border);border-radius:12px;padding:32px;text-align:center;color:var(--muted);font-size:0.85rem;line-height:1.7;}

.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:9px;font-size:0.8rem;z-index:2000;transform:translateY(14px);opacity:0;transition:all .28s;display:flex;align-items:center;gap:8px;max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:var(--success);}
.toast.joker{border-color:var(--joker);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

@media(max-width:768px){
  header{padding:18px;}nav{padding:10px 18px;overflow-x:auto;}
  main{flex-direction:column;}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);padding:16px;max-height:none;}
  .content{padding:16px;}
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <h1>Zinciri Kırma</h1>
    <p>Her gün bir halka — zincir büyüsün</p>
  </div>
  <div class="today-pill">
    <div class="big" id="hdrDay"></div>
    <div class="small" id="hdrDate"></div>
  </div>
</header>
<nav>
  <button class="active" onclick="switchTab('calendar',this)">📅 Takvim</button>
  <button onclick="switchTab('stats',this)">📊 İstatistik</button>
  <button onclick="switchTab('heatmap',this)">🔥 Isı Haritası</button>
</nav>
<main>
  <aside class="sidebar">
    <div id="sideQuote"></div>
    <div>
      <div class="sec">Hedefler</div>
      <div id="goalList" class="goal-list"></div>
    </div>
    <div id="jokerSection" style="display:none;">
      <div class="sec">Joker Gün</div>
      <div id="jokerBox" class="joker-box"></div>
      <button class="btn joker-btn" id="jokerBtn" onclick="useJoker()" style="margin-top:8px;">★ Bugün İçin Joker Kullan</button>
    </div>
    <div>
      <div class="sec">Yeni Hedef</div>
      <div class="form-col">
        <input type="text" id="gName" placeholder="Hedef adı (ör: Meditasyon)" maxlength="40">
        <textarea id="gDesc" placeholder="Açıklama (opsiyonel)" rows="2" maxlength="100"></textarea>
        <div class="color-row" id="colorPicker"></div>
        <button class="btn" onclick="addGoal()">+ Hedef Ekle</button>
      </div>
    </div>
  </aside>
  <div class="content">
    <div id="tab-calendar" class="tab-panel active">
      <div class="year-nav">
        <button onclick="changeYear(-1)">←</button>
        <div class="year-lbl" id="yearLbl">2026</div>
        <button onclick="changeYear(1)">→</button>
        <span class="yr-hint">Tamamladığın günlere tıkla ✓</span>
      </div>
      <div id="calContainer"></div>
    </div>
    <div id="tab-stats" class="tab-panel">
      <div id="statsContent"></div>
    </div>
    <div id="tab-heatmap" class="tab-panel">
      <div id="heatmapContent"></div>
    </div>
  </div>
</main>
<div class="toast" id="toast"><span id="toastIco"></span><span id="toastMsg"></span></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────
const COLORS=['#d4a853','#c4824a','#6aaa6a','#5a9ec4','#a47bc4','#c45a5a','#4ab8b8','#c4b84a'];
const WDAYS=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
const MONTHS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const QUOTES=[
  {t:'Başarı, her gün tekrarlanan küçük çabaların toplamıdır.',a:'Robert Collier'},
  {t:'Zinciri kırma. Her gün o halkayı ekle.',a:'Jerry Seinfeld'},
  {t:'Disiplin, hedeflerinle sevgin arasındaki köprüdür.',a:'Jim Rohn'},
  {t:'Her yolculuk tek bir adımla başlar.',a:'Lao Tzu'},
  {t:'Motivasyon seni başlatır, alışkanlık seni ilerletir.',a:'Jim Ryun'},
  {t:'Küçük değişiklikler zamanla büyük farklılıklar yaratır.',a:'Anonim'},
  {t:'Kendine iyi alışkanlıklar edin; kötü alışkanlıklar seni edinmeden önce.',a:'Anonim'},
  {t:'Kazananlar her gün yapmak istemediklerini de yaparlar.',a:'Ed Macauley'},
  {t:'Bir şeyi sürekli yaparsan o şey kolaylaşmaz; sen güçlenirsin.',a:'Anonim'},
  {t:'Eylem, endişenin en iyi panzehiridir.',a:'Joan Baez'},
  {t:'İnsanlar değil, alışkanlıklar başarılı ya da başarısız olur.',a:'Anonim'},
  {t:'Bugün acı çekerek çalışmak, yarın ağlamadan yaşamaktır.',a:'Anonim'},
  {t:'Her yeni sabah yeniden başlama fırsatıdır.',a:'Anonim'},
  {t:'Gelişim mükemmeliyette değil, süreklilikte gizlidir.',a:'Anonim'},
  {t:'Güç, bedenin yeterliliğinden değil irade gücünden gelir.',a:'Mahatma Gandhi'},
  {t:'Bir hedefin yoksa her rüzgar olumsuz eser.',a:'Montaigne'},
  {t:'Büyüklük anlık bir eylem değil, alışkanlıkların toplamıdır.',a:'Aristoteles'},
  {t:'Yavaş ilerliyorsan bile durma; hareketsiz duranları geçiyorsun.',a:'Konfüçyüs'},
  {t:'Seninle en çok zaman geçiren kişi sensin — kendine iyi bir arkadaş ol.',a:'Anonim'},
  {t:'Yarın yapacaklarını bugün yap, bugün yapacaklarını şimdi yap.',a:'Anonim'},
  {t:'Başarı bir tesadüf değil, doğru alışkanlıkların birikmesidir.',a:'Anonim'},
];
const BADGE_DEFS=[
  {id:'s3',icon:'🌱',name:'Tohum',desc:'3 gün serisi',req:3},
  {id:'s7',icon:'🔥',name:'Bir Hafta',desc:'7 gün serisi',req:7},
  {id:'s14',icon:'⚡',name:'İki Hafta',desc:'14 gün serisi',req:14},
  {id:'s21',icon:'💪',name:'Alışkanlık',desc:'21 gün serisi',req:21},
  {id:'s30',icon:'🏅',name:'Bir Ay',desc:'30 gün serisi',req:30},
  {id:'s50',icon:'🎖️',name:'Elli Gün',desc:'50 gün serisi',req:50},
  {id:'s100',icon:'🏆',name:'Yüz Gün',desc:'100 gün serisi',req:100},
  {id:'s365',icon:'👑',name:'Bir Yıl',desc:'365 gün serisi',req:365},
];

// ─── STATE ───────────────────────────────────────────────────
let S={goals:[],completions:{},jokers:{},badges:{},selectedGoalId:null,currentYear:2026,selectedColor:COLORS[0],quoteIdx:0};
const TODAY=new Date(); TODAY.setHours(0,0,0,0);

// ─── HELPERS ────────────────────────────────────────────────
function dk(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function yk(yr,mo,dy){return `${yr}-${p2(mo+1)}-${p2(dy)}`;}
function p2(n){return String(n).padStart(2,'0');}
function isFuture(yr,mo,dy){return new Date(yr,mo,dy)>TODAY;}
function isToday(yr,mo,dy){return TODAY.getFullYear()===yr&&TODAY.getMonth()===mo&&TODAY.getDate()===dy;}
function daysInMonth(yr,mo){return new Date(yr,mo+1,0).getDate();}
function firstDay(yr,mo){let d=new Date(yr,mo,1).getDay();return d===0?6:d-1;}
function C(id){return S.completions[id]||(S.completions[id]=new Set());}
function J(id){return S.jokers[id]||(S.jokers[id]=new Set());}
function B(id){return S.badges[id]||(S.badges[id]=new Set());}
function isDone(gid,key){return C(gid).has(key)||J(gid).has(key);}

function getStreak(gid){
  let streak=0,d=new Date(TODAY);
  if(!isDone(gid,dk(d))) d.setDate(d.getDate()-1);
  while(isDone(gid,dk(d))){streak++;d.setDate(d.getDate()-1);if(streak>3650)break;}
  return streak;
}
function getLongest(gid){
  const all=[...C(gid),...J(gid)].sort();
  if(!all.length)return 0;
  let max=1,cur=1;
  for(let i=1;i<all.length;i++){
    const diff=(new Date(all[i])-new Date(all[i-1]))/86400000;
    if(diff===1){cur++;max=Math.max(max,cur);}else if(diff>1){cur=1;}
  }
  return max;
}
function totalDone(gid){return C(gid).size+J(gid).size;}
function canUseJoker(gid){
  if(isDone(gid,dk(TODAY)))return false;
  const yest=new Date(TODAY);yest.setDate(yest.getDate()-1);
  if(J(gid).has(dk(yest)))return false;
  return true;
}

// ─── STORAGE ────────────────────────────────────────────────
function save(){
  try{
    const d={goals:S.goals,selectedGoalId:S.selectedGoalId,currentYear:S.currentYear,selectedColor:S.selectedColor,quoteIdx:S.quoteIdx,completions:{},jokers:{},badges:{}};
    for(const [k,v] of Object.entries(S.completions))d.completions[k]=[...v];
    for(const [k,v] of Object.entries(S.jokers))d.jokers[k]=[...v];
    for(const [k,v] of Object.entries(S.badges))d.badges[k]=[...v];
    localStorage.setItem('zkv3',JSON.stringify(d));
  }catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem('zkv3');if(!raw)return;
    const d=JSON.parse(raw);
    S.goals=d.goals||[];S.selectedGoalId=d.selectedGoalId||null;
    S.currentYear=d.currentYear||2026;S.selectedColor=d.selectedColor||COLORS[0];S.quoteIdx=d.quoteIdx||0;
    S.completions={};S.jokers={};S.badges={};
    for(const [k,v] of Object.entries(d.completions||{}))S.completions[k]=new Set(v);
    for(const [k,v] of Object.entries(d.jokers||{}))S.jokers[k]=new Set(v);
    for(const [k,v] of Object.entries(d.badges||{}))S.badges[k]=new Set(v);
  }catch(e){}
}

// ─── BADGE CHECK ─────────────────────────────────────────────
function checkBadges(gid){
  const streak=getStreak(gid),earned=B(gid);let changed=false;
  BADGE_DEFS.forEach(b=>{if(streak>=b.req&&!earned.has(b.id)){earned.add(b.id);changed=true;setTimeout(()=>toast(`${b.icon} Rozet kazandın: ${b.name}!`,'ok'),350);}});
  if(changed)save();
}

// ─── TOAST ───────────────────────────────────────────────────
let _tt;
function toast(msg,type='ok'){
  clearTimeout(_tt);
  const t=document.getElementById('toast');
  document.getElementById('toastIco').textContent=type==='ok'?'✓':type==='joker'?'★':'ℹ';
  document.getElementById('toastMsg').textContent=msg;
  t.className=`toast show ${type}`;
  _tt=setTimeout(()=>t.classList.remove('show'),2800);
}

// ─── TAB ─────────────────────────────────────────────────────
function switchTab(tab,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  if(btn)btn.classList.add('active');
  if(tab==='stats')renderStats();
  if(tab==='heatmap')renderHeatmap();
}

// ─── HEADER ──────────────────────────────────────────────────
function updateHeader(){
  const DAYS=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  document.getElementById('hdrDay').textContent=TODAY.getDate();
  document.getElementById('hdrDate').textContent=`${DAYS[TODAY.getDay()]} · ${MONTHS[TODAY.getMonth()]} ${TODAY.getFullYear()}`;
}

// ─── QUOTE ───────────────────────────────────────────────────
function renderQuote(){
  const q=QUOTES[S.quoteIdx%QUOTES.length];
  document.getElementById('sideQuote').innerHTML=`
    <div class="quote-card">
      <div class="quote-txt">${q.t}</div>
      <div class="quote-author">— ${q.a}</div>
      <button class="qbtn" onclick="nextQuote()">↻ Farklı Söz</button>
    </div>`;
}
function nextQuote(){S.quoteIdx=(S.quoteIdx+1+Math.floor(Math.random()*4))%QUOTES.length;save();renderQuote();}

// ─── COLOR PICKER ────────────────────────────────────────────
function initColorPicker(){
  const cp=document.getElementById('colorPicker');cp.innerHTML='';
  COLORS.forEach(c=>{
    const sw=document.createElement('div');sw.className='swatch'+(c===S.selectedColor?' on':'');sw.style.background=c;
    sw.onclick=()=>{S.selectedColor=c;document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on'));sw.classList.add('on');};
    cp.appendChild(sw);
  });
}

// ─── JOKER ───────────────────────────────────────────────────
function renderJoker(){
  const gid=S.selectedGoalId,sec=document.getElementById('jokerSection');
  if(!gid){sec.style.display='none';return;}
  sec.style.display='block';
  const todayKey=dk(TODAY),yest=new Date(TODAY);yest.setDate(yest.getDate()-1);
  const todayJoker=J(gid).has(todayKey),yestJoker=J(gid).has(dk(yest));
  const canUse=canUseJoker(gid);
  document.getElementById('jokerBox').innerHTML=`
    <div class="jt">Joker Durumu</div>
    <div class="jv">${todayJoker?'Bugün joker kullanıldı ★':yestJoker?'Dün joker kullanıldı':'Joker kullanılabilir'}</div>
    <div class="jh">Ardışık 2 joker kullanılamaz</div>`;
  const btn=document.getElementById('jokerBtn');
  btn.disabled=!canUse;
  btn.textContent=todayJoker?'★ Bugün Joker Kullanıldı':'★ Bugün İçin Joker Kullan';
}
function useJoker(){
  const gid=S.selectedGoalId;if(!gid)return;
  if(!canUseJoker(gid)){toast('Joker şu an kullanılamaz!','info');return;}
  J(gid).add(dk(TODAY));save();checkBadges(gid);
  renderGoalList();renderCalendar();renderJoker();
  toast('★ Joker günü kullanıldı! Seri devam ediyor.','joker');
}

// ─── GOALS ───────────────────────────────────────────────────
function addGoal(){
  const name=document.getElementById('gName').value.trim();
  if(!name){toast('Hedef adı girin!','info');return;}
  const g={id:'g_'+Date.now(),name,desc:document.getElementById('gDesc').value.trim(),color:S.selectedColor,createdAt:dk(TODAY)};
  S.goals.push(g);S.completions[g.id]=new Set();S.jokers[g.id]=new Set();S.badges[g.id]=new Set();
  S.selectedGoalId=g.id;
  document.getElementById('gName').value='';document.getElementById('gDesc').value='';
  save();renderGoalList();renderCalendar();renderJoker();
  toast(`"${name}" eklendi!`);
}
function deleteGoal(id){
  if(!confirm('Bu hedefi silmek istediğinize emin misiniz?'))return;
  S.goals=S.goals.filter(g=>g.id!==id);
  delete S.completions[id];delete S.jokers[id];delete S.badges[id];
  if(S.selectedGoalId===id)S.selectedGoalId=S.goals[0]?.id||null;
  save();renderGoalList();renderCalendar();renderJoker();
  toast('Hedef silindi.','info');
}
function selectGoal(id){S.selectedGoalId=id;save();renderGoalList();renderCalendar();renderJoker();}
function renderGoalList(){
  const list=document.getElementById('goalList');
  if(!S.goals.length){list.innerHTML=`<div style="color:var(--muted);font-size:0.76rem;text-align:center;padding:12px;">Henüz hedef yok.</div>`;return;}
  list.innerHTML='';
  S.goals.forEach(g=>{
    const streak=getStreak(g.id),total=totalDone(g.id);
    const div=document.createElement('div');
    div.className='goal-item'+(g.id===S.selectedGoalId?' on':'');
    div.style.setProperty('--gc',g.color);
    div.innerHTML=`
      <div class="gi-row">
        <div class="gi-name">${g.name}</div>
        <div class="gi-streak">🔥 ${streak}</div>
        <button class="gi-del" onclick="event.stopPropagation();deleteGoal('${g.id}')">✕</button>
      </div>
      ${g.desc?`<div class="gi-desc">${g.desc}</div>`:''}
      <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,(total/365)*100)}%;background:${g.color};"></div></div>
      <div class="gi-sub">${total} / 365 gün</div>`;
    div.onclick=()=>selectGoal(g.id);
    list.appendChild(div);
  });
}

// ─── CALENDAR ────────────────────────────────────────────────
function changeYear(d){const y=S.currentYear+d;if(y<2026||y>2035)return;S.currentYear=y;save();renderCalendar();}

function toggleDay(yr,mo,dy){
  const gid=S.selectedGoalId;
  if(!gid){toast('Önce bir hedef seçin!','info');return;}
  if(isFuture(yr,mo,dy))return;
  const key=yk(yr,mo,dy);
  if(J(gid).has(key)){toast('Bu gün joker günü.','info');return;}
  if(C(gid).has(key)){C(gid).delete(key);toast('Gün kaldırıldı.','info');}
  else{C(gid).add(key);const st=getStreak(gid);if(st>0&&st%10===0)toast(`🎉 ${st} günlük zincir! Muazzam!`,'ok');else toast('✓ Tamamlandı!');}
  checkBadges(gid);
  save();
  // Full re-render to ensure correctness across all goals
  renderGoalList();renderCalendar();renderJoker();
}

function renderCalendar(){
  document.getElementById('yearLbl').textContent=S.currentYear;
  const container=document.getElementById('calContainer');
  if(!S.selectedGoalId||!S.goals.length){
    container.innerHTML=`<div class="no-goal"><div style="font-size:2rem;opacity:.2;margin-bottom:10px;">🎯</div>Soldan bir hedef seç ya da yeni hedef ekle.</div>`;return;
  }
  const goal=S.goals.find(g=>g.id===S.selectedGoalId);
  if(!goal)return;
  // Read from state at render time — single source of truth
  const c=C(S.selectedGoalId),j=J(S.selectedGoalId);
  container.innerHTML='';
  const grid=document.createElement('div');grid.className='year-cal fade-up';

  for(let m=0;m<12;m++){
    const dim=daysInMonth(S.currentYear,m),fd=firstDay(S.currentYear,m);
    let cnt=0;
    for(let d=1;d<=dim;d++){const k=yk(S.currentYear,m,d);if(c.has(k)||j.has(k))cnt++;}
    const mb=document.createElement('div');mb.className='month-block';
    mb.innerHTML=`
      <div class="month-hdr">
        <div class="month-name">${MONTHS[m]}</div>
        <div class="month-stat">${cnt>0?`✓ ${cnt}/${dim}`:''}</div>
      </div>
      <div class="wday-row">${WDAYS.map(w=>`<div class="wday">${w}</div>`).join('')}</div>`;
    const dg=document.createElement('div');dg.className='days-grid';
    for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='dc empty';dg.appendChild(e);}
    for(let d=1;d<=dim;d++){
      const key=yk(S.currentYear,m,d);
      const fut=isFuture(S.currentYear,m,d),tod=isToday(S.currentYear,m,d);
      const done=c.has(key),joker=j.has(key);
      const dc=document.createElement('div');
      dc.className='dc'+(fut?' fut':'')+(tod?' today':'')+(done?' done':'')+(joker?' joker-day':'');
      dc.textContent=d;
      if(done)dc.style.background=goal.color;
      if(!fut)dc.onclick=()=>toggleDay(S.currentYear,m,d);
      dc.title=`${d} ${MONTHS[m]} ${S.currentYear}`+(done?' ✓':'')+(joker?' ★':'');
      dg.appendChild(dc);
    }
    mb.appendChild(dg);grid.appendChild(mb);
  }
  container.appendChild(grid);
}

// ─── STATS ───────────────────────────────────────────────────
function renderStats(){
  const content=document.getElementById('statsContent');
  if(!S.goals.length){content.innerHTML=`<div class="empty-state"><div class="icon">📊</div><h3>Henüz hedef yok</h3><p>Hedef ekleyince istatistikler burada görünür.</p></div>`;return;}
  let html='';
  S.goals.forEach(g=>{
    const streak=getStreak(g.id),longest=getLongest(g.id),total=totalDone(g.id);
    const created=new Date(g.createdAt||dk(TODAY));
    const days=Math.max(1,Math.ceil((TODAY-created)/86400000)+1);
    const rate=Math.round((total/days)*100);
    const earned=B(g.id);
    html+=`
      <div style="margin-bottom:32px;">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px;">
          <div style="width:9px;height:9px;border-radius:50%;background:${g.color};flex-shrink:0;"></div>
          <div style="font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;">${g.name}</div>
          ${g.desc?`<div style="font-size:0.7rem;color:var(--muted);">— ${g.desc}</div>`:''}
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="slbl">Mevcut Seri</div><div class="sval" style="color:${g.color}">${streak}</div><div class="ssub">gün üst üste</div></div>
          <div class="stat-card"><div class="slbl">En Uzun Seri</div><div class="sval" style="color:${g.color}">${longest}</div><div class="ssub">günlük rekor</div></div>
          <div class="stat-card"><div class="slbl">Toplam Gün</div><div class="sval" style="color:${g.color}">${total}</div><div class="ssub">tamamlandı</div></div>
          <div class="stat-card"><div class="slbl">Tamamlanma</div><div class="sval" style="color:${g.color}">${rate}%</div><div class="ssub">başlangıçtan beri</div></div>
        </div>
        <div style="font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:7px;">
          Rozetler <span style="font-size:0.62rem;font-weight:300;color:var(--muted);font-family:'DM Sans',sans-serif;">${earned.size} / ${BADGE_DEFS.length}</span>
        </div>
        <div class="badges-row">
          ${BADGE_DEFS.map(b=>`
            <div class="badge ${earned.has(b.id)?'earned':'locked'}">
              <div class="badge-icon">${b.icon}</div>
              <div><div class="badge-name">${b.name}</div><div class="badge-desc">${b.desc}</div></div>
            </div>`).join('')}
        </div>
        <div style="height:1px;background:var(--border);margin-top:2px;"></div>
      </div>`;
  });
  content.innerHTML=html;
}

// ─── HEATMAP ─────────────────────────────────────────────────
function hexToRgb(hex){return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}

function renderHeatmap(){
  const content=document.getElementById('heatmapContent');
  if(!S.goals.length){content.innerHTML=`<div class="empty-state"><div class="icon">🔥</div><h3>Hedef Yok</h3><p>Önce bir hedef ekleyin.</p></div>`;return;}

  // Count per day across all goals
  const dayMap={};
  S.goals.forEach(g=>{[...C(g.id),...J(g.id)].forEach(k=>{dayMap[k]=(dayMap[k]||0)+1;});});
  const maxGoals=S.goals.length||1;

  // Color based on selected goal
  const ref=S.goals.find(g=>g.id===S.selectedGoalId)||S.goals[0];
  const [r,g,b]=hexToRgb(ref.color);
  function intensityBg(count){
    if(!count)return '#1a1916';
    // Map 1/max -> 4 levels: 0.12, 0.35, 0.6, 0.9
    const ratio=count/maxGoals;
    const a=ratio<=0.25?0.15:ratio<=0.5?0.35:ratio<=0.75?0.6:0.9;
    return `rgba(${r},${g},${b},${a})`;
  }

  let html=`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;">
      <div class="sec" style="margin-bottom:0;">Tüm Hedefler — ${S.currentYear}</div>
    </div>
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:14px;font-size:0.68rem;color:var(--muted);">
      Az
      ${[0.15,0.35,0.6,0.9].map(a=>`<div style="width:11px;height:11px;border-radius:2px;background:rgba(${r},${g},${b},${a});display:inline-block;"></div>`).join('')}
      Çok &nbsp;·&nbsp; Renk = tamamlanan hedef sayısı
    </div>
    <div class="heatmap-wrap"><div class="heatmap-grid">`;

  let cur=new Date(S.currentYear,0,1);
  const off=cur.getDay()===0?6:cur.getDay()-1;
  cur.setDate(cur.getDate()-off);
  const end=new Date(S.currentYear,11,31);

  while(cur<=end){
    html+=`<div class="hm-week">`;
    for(let w=0;w<7;w++){
      const key=dk(cur);
      const inYear=cur.getFullYear()===S.currentYear,fut=cur>TODAY;
      const count=dayMap[key]||0;
      if(!inYear){html+=`<div class="hmc" style="background:transparent;cursor:default;"></div>`;}
      else if(fut){html+=`<div class="hmc" style="background:#1a1916;opacity:0.25;" title="${key}"></div>`;}
      else{
        const bg=intensityBg(count);
        html+=`<div class="hmc" style="background:${bg};" title="${key}${count?' — '+count+' hedef':''}"></div>`;
      }
      const nx=new Date(cur);nx.setDate(nx.getDate()+1);cur=nx;
    }
    html+=`</div>`;
    if(cur>end&&(cur.getDay()===1||cur.getDay()===0))break;
  }
  html+=`</div></div>`;

  html+=`<div style="display:flex;gap:0;margin-top:7px;">`;
  MONTHS.forEach((mn,i)=>{
    const dim=daysInMonth(S.currentYear,i),w=Math.ceil(dim/7)*15;
    html+=`<div style="min-width:${w}px;font-size:0.58rem;color:var(--muted);letter-spacing:0.04em;">${mn}</div>`;
  });
  html+=`</div>`;

  content.innerHTML=html;
}

// ─── INIT ────────────────────────────────────────────────────
function init(){
  load();updateHeader();initColorPicker();renderQuote();
  renderGoalList();renderCalendar();renderJoker();
  if(!S.goals.length){
    const g={id:'g_welcome',name:'Günlük Alışkanlık',desc:'Zinciri kırma!',color:COLORS[0],createdAt:dk(TODAY)};
    S.goals.push(g);S.completions[g.id]=new Set();S.jokers[g.id]=new Set();S.badges[g.id]=new Set();
    S.selectedGoalId=g.id;save();renderGoalList();renderCalendar();renderJoker();
  }
}
init();
</script>
